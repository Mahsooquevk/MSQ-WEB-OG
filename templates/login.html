<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Finance Bank</title>
<!-- ====== ADD THIS INSIDE <head> OF ALL YOUR HTML TEMPLATES ====== -->

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#00c6ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PF Bank">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">

<script>
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/static/sw.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW error:', err));
    });
  }

  // Show Install Button (Android Chrome)
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    if (btn) btn.style.display = 'block';
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    }
  }
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
width:380px;
padding:40px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(0,0,0,0.4);
color:white;
}

.logo{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:25px;
letter-spacing:1px;
}

.logo span{
color:#00e0ff;
}

form input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:none;
border-radius:8px;
outline:none;
font-size:15px;
}

form label{
font-size:14px;
opacity:0.9;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00c6ff;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00c6ff;
}

.footer{
text-align:center;
margin-top:18px;
font-size:13px;
opacity:0.8;
}

.footer a{
color:#00e0ff;
text-decoration:none;
}

.security{
text-align:center;
font-size:12px;
margin-top:10px;
opacity:0.7;
}
/* Error Toast */
.toast {
    position: fixed;
    bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(231,76,60,0.95);
    color: white; font-size: 14px; font-weight: 600;
    padding: 12px 24px; border-radius: 30px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    z-index: 99999; transition: transform 0.4s ease;
    white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Error Modal */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(5px);
}
.modal-overlay.show { display: flex; }
.modal-box {
    background: linear-gradient(145deg, #0f2027, #1a3a4a, #2c5364);
    border: 1px solid rgba(231,76,60,0.4);
    border-radius: 20px;
    padding: 40px 36px 32px;
    text-align: center;
    color: white;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(231,76,60,0.1);
    max-width: 340px;
    width: 90%;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
    from { transform: scale(0.75); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
}
.modal-icon {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: rgba(231,76,60,0.12);
    border: 2px solid rgba(231,76,60,0.4);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    font-size: 32px;
}
.modal-box h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.modal-box p  { font-size: 13px; opacity: 0.7; margin-bottom: 24px; line-height: 1.6; }
.btn-ok {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #c0392b, #e74c3c);
    color: white;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 4px 15px rgba(231,76,60,0.35);
}
.btn-ok:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(231,76,60,0.55); }
</style>
</head>

<body>

<div class="container">

<div class="logo">
🏦 <span>MSQ Bank</span>
</div>

<form method="post" id="loginForm">

<label>Username</label>
<input name="username" placeholder="Enter your username" required autocomplete="off">

<label>Password</label>
<input type="password" name="password" placeholder="Enter your password" required autocomplete="new-password">

<button type="submit">Secure Login</button>

</form>

<div class="security">
🔒 Your connection is secure
</div>

<div class="footer">
Forgot password? <a href="#">Recover</a>
</div>
<!-- ERROR MODAL -->
<div class="modal-overlay" id="errorModal">
    <div class="modal-box">
        <div class="modal-icon">❌</div>
        <h3>Login Failed</h3>
        <p>Invalid username or password.<br>Please check your credentials and try again.</p>
        <button class="btn-ok" onclick="document.getElementById('errorModal').classList.remove('show')">
            Try Again
        </button>
    </div>
</div>
</div>
<script>
{% if error %}
window.addEventListener('load', function() {
    document.getElementById('errorModal').classList.add('show');
});
{% endif %}
</script>
</body>
</html>
