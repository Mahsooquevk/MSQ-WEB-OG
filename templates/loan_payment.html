<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Repayment</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#00c6ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PF Bank">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link href="/static/fontawesome/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}

body{
  padding-top:80px;
  padding-bottom:40px;
  height:100vh; 
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.container{
  width:450px;
  padding:35px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
  box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h2{text-align:center;margin-bottom:25px;font-size:28px;}
label{font-size:14px;opacity:0.9;}

input,select{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  outline:none;
  font-size:14px;
}

.row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.col{flex:1;}
.or{margin-top:25px;font-weight:bold;color:#00e0ff;}

button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  margin-top:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  letter-spacing:0.5px;
  box-shadow:0 4px 20px rgba(0,114,255,0.4);
}
button:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(0,198,255,0.55);}

.back{text-align:center;margin-top:18px;font-size:13px;}
.back a{color:#00e0ff;text-decoration:none;}
.back a:hover{text-decoration:underline;opacity:0.8;}

.dd-wrap { position: relative; }
.dd-input-row {
  display: flex; align-items: center;
  background: rgba(255,255,255,0.95);
  border-radius: 8px; position: relative; cursor: pointer;
  margin-top: 6px;
}
.dd-input-row input {
  flex:1; border:none; outline:none;
  padding:12px 32px 12px 12px; font-size:14px;
  background:transparent; color:#222;
  margin-top:0; border-radius:8px; cursor:pointer;
}
.dd-arrow {
  position:absolute; right:10px; top:50%;
  transform:translateY(-50%); color:#888;
  font-size:10px; pointer-events:none; transition:transform 0.2s;
}
.dd-arrow.open { transform:translateY(-50%) rotate(180deg); }
.dd-list {
  display:none; position:absolute; top:calc(100% + 4px);
  left:0; right:0; background:#fff; border-radius:10px;
  box-shadow:0 8px 28px rgba(0,0,0,0.25); max-height:200px;
  overflow-y:auto; z-index:999; border:1px solid rgba(0,198,255,0.3);
}
.dd-list.open { display:block; animation:ddIn 0.15s ease; }
@keyframes ddIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
.dd-item {
  padding:10px 14px; cursor:pointer; color:#222; font-size:14px;
  border-bottom:1px solid #f0f0f0;
}
.dd-item:last-child { border-bottom:none; }
.dd-item:hover { background:#e8f7ff; }
.dd-empty { padding:12px; text-align:center; color:#aaa; font-size:13px; }

#infoCard{
  border-radius:12px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(0,224,255,0.2);
  margin-bottom:16px;
  display:none;
}
#infoCard .card-body{
  display:grid;
  grid-template-columns:1fr 1fr;
}
.stat-item{padding:12px;}
.stat-label{font-size:10px;opacity:0.5;}
.stat-value{font-size:16px;font-weight:bold;}
.green{color:#00ffa3;}
.orange{color:#ff9f43;}
.red{color:#ff6b6b;}

#successOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#successOverlay.show { display: flex; }

#successPopup {
  background: linear-gradient(145deg,#0f2027,#1a3a4a,#2c5364);
  border: 1px solid rgba(0,224,255,0.35);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  color: white;
  width: 90%;
  max-width: 360px;
}

.popup-icon-wrap {
  width: 70px; height: 70px;
  border-radius: 50%;
  background: rgba(0,255,160,0.1);
  border: 2px solid #00ffa3;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  font-size: 30px;
}

.ok-btn {
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color: white; border: none; border-radius: 10px;
  padding: 12px; width: 100%; cursor: pointer; font-weight: bold;
}

/* ── NAVBAR ── */
.navbar{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  padding:15px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.navbar .nav-links{
  display:flex;
  gap:15px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:center;
}

.navbar a{
  text-decoration:none;
  color:white;
  padding:10px 16px;
  border-radius:8px;
  background:linear-gradient(135deg,#2d8ac7,#0072ff);
  font-size:14px;
  transition:0.3s;
  display:flex;
  align-items:center;
  gap:6px;
}

.navbar a:hover{
  background:linear-gradient(135deg,#00c6ff,#00e0ff);
  color:black;
  transform:translateY(-2px);
}

.navbar .logout-btn{
  position:absolute;
  right:20px;
  background:linear-gradient(135deg,#f7971e,#ffd200) !important;
  color:black !important;
}
.navbar .logout-btn:hover{
  background:linear-gradient(135deg,#ffd200,#f7971e) !important;
  color:black !important;
}

/* ── MOBILE ── */
@media(max-width:768px){
  .container{ width:95%; }
  .navbar .nav-links{ gap:8px; }
  .navbar a{ padding:8px 10px; font-size:12px; }
  .navbar .logout-btn{ position:static; }
}

</style>
</head>

<body>
<!-- ── NAVBAR ── -->
<div class="navbar">
  <div class="nav-links">
    <a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a>
    <a href="/create_account"><i class="fa fa-user-plus"></i> Add Member</a>
    <a href="/deposit"><i class="fa fa-coins"></i> Deposit</a>
    <a href="/withdraw"><i class="fa fa-money-bill"></i> Withdraw</a>
    <a href="/new_loan"><i class="fa fa-hand-holding-dollar"></i> Add Loan</a>
    <a href="/loan_payment"><i class="fa fa-credit-card"></i> Repay Loan</a>
    <a href="/add_service_expense"><i class="fa fa-file-invoice-dollar"></i> Service Expense</a>
    <a href="/report"><i class="fa fa-chart-pie"></i> Reports</a>
  </div>
  <a href="/logout" class="logout-btn"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>


<!-- ✅ SINGLE POPUP -->
<div id="successOverlay">
  <div id="successPopup">
    <div class="popup-icon-wrap">✅</div>
    <h3>Payment Successful!</h3>
    <p>Your loan payment has been recorded successfully.</p>
    <button class="ok-btn" onclick="closeSuccessPopup()">OK - View Report</button>
  </div>
</div>

<div class="container">

<h2><i class="fa fa-hand-holding-dollar" style="color:#00e0ff;"></i> Loan Repayment</h2>

<form method="post" id="loanForm">

<div class="row">
  <div class="col">
    <label>Customer</label>
    <div class="dd-wrap">
      <div class="dd-input-row" id="nameRow">
        <input type="text" id="nameSearch" placeholder="Search name..." readonly>
        <span class="dd-arrow" id="nameArrow">▼</span>
      </div>
      <div class="dd-list" id="nameList"></div>
    </div>
  </div>

  <div class="or">OR</div>

  <div class="col">
    <label>Account</label>
    <div class="dd-wrap">
      <div class="dd-input-row" id="accRow">
        <input type="text" id="accSearch" placeholder="Search acc no..." readonly>
        <span class="dd-arrow" id="accArrow">▼</span>
      </div>
      <div class="dd-list" id="accList"></div>
    </div>
  </div>
</div>

<select id="customerSelect" style="display:none;">
{% for c in customers_with_loans %}
<option value="{{c.id}}">{{c.name}}</option>
{% endfor %}
</select>

<label>Mobile</label>
<input id="mobileInput" readonly>

<label>Select Loan</label>
<select id="loanSelect" required></select>

<div id="infoCard">
  <div class="card-body">
    <div class="stat-item"><div class="stat-label">Balance</div><div id="balanceText" class="stat-value green">₹0</div></div>
    <div class="stat-item"><div class="stat-label">Loan</div><div id="loanAmount" class="stat-value">₹0</div></div>
    <div class="stat-item"><div class="stat-label">Paid</div><div id="loanPaid" class="stat-value orange">₹0</div></div>
    <div class="stat-item"><div class="stat-label">Remaining</div><div id="loanRemaining" class="stat-value red">₹0</div></div>
  </div>
</div>

<input type="hidden" name="loan_id" id="loanIdInput">

<label>Amount</label>
<input name="amount" id="paymentAmount" type="number" required autocomplete="off">

<button type="submit"><i class="fa fa-paper-plane"></i> Pay Loan</button>

</form>

</div>

<script>
const customers = [
{% for c in customers_with_loans %}
{ id:"{{c.id}}", name:"{{c.name}}", acc:"{{c.account_number}}", mobile:"{{c.mobile}}" },
{% endfor %}
];

let _selected = null;

function makeDd(rowId, searchId, arrowId, listId, filterFn, labelFn, onPick) {
  const row    = document.getElementById(rowId);
  const search = document.getElementById(searchId);
  const arrow  = document.getElementById(arrowId);
  const list   = document.getElementById(listId);
  let open = false;
  let _cur = null;

  function render(q) {
    q = (q || "").toLowerCase().trim();
    const matches = customers.filter(c => filterFn(c, q));
    list.innerHTML = "";
    if (!matches.length) { list.innerHTML = '<div class="dd-empty">No results found</div>'; return; }
    matches.forEach(c => {
      const d = document.createElement("div");
      d.className = "dd-item";
      d.textContent = labelFn(c);
      d.addEventListener("mousedown", e => { e.preventDefault(); pick(c); });
      list.appendChild(d);
    });
  }

  function openDd() {
    search.readOnly = false; search.value = "";
    render("");
    list.classList.add("open"); arrow.classList.add("open");
    open = true; search.focus();
  }

  function closeDd(c) {
    list.classList.remove("open"); arrow.classList.remove("open");
    open = false; search.readOnly = true;
    search.value = c ? labelFn(c) : "";
    if (!c) search.placeholder = search.dataset.ph;
    _cur = c || null;
  }

  function pick(c) { closeDd(c); onPick(c); }

  row.addEventListener("click", () => open ? closeDd(_cur) : openDd());
  search.addEventListener("input", () => render(search.value));
  search.addEventListener("blur", () => setTimeout(() => closeDd(_cur), 150));
  document.addEventListener("click", e => { if (!row.contains(e.target) && !list.contains(e.target)) closeDd(_cur); });

  return { setCur: (c) => closeDd(c) };
}

function selectCustomer(c) {
  _selected = c;
  document.getElementById("customerSelect").value = c.id;
  document.getElementById("mobileInput").value = c.mobile || "";
  loadLoans(c.id);
}

const nameDd = makeDd("nameRow","nameSearch","nameArrow","nameList",
  (c,q) => !q || c.name.toLowerCase().includes(q),
  c => c.name,
  (c) => { selectCustomer(c); accDd.setCur(c); }
);
document.getElementById("nameSearch").dataset.ph = "Search name...";

const accDd = makeDd("accRow","accSearch","accArrow","accList",
  (c,q) => !q || c.acc.includes(q),
  c => c.acc,
  (c) => { selectCustomer(c); nameDd.setCur(c); }
);
document.getElementById("accSearch").dataset.ph = "Search acc no...";
/* ✅ LOAN CLOSED LOGIC ADDED */
function loadLoans(id){
  fetch("/get_loans_by_customer/"+id)
  .then(r=>r.json())
  .then(data=>{
    const sel=document.getElementById("loanSelect");
    sel.innerHTML='<option value="">-- Select Loan --</option>';

    data.loans.forEach(l=>{
      const o=document.createElement("option");
      o.value = l.id;

      if(parseFloat(l.remaining) <= 0){
        o.textContent = l.loan_account_number + " | Loan Closed";
        o.style.color = "#000";
        o.disabled = true;
      }else{
        o.textContent = l.loan_account_number + " | ₹" + l.remaining;
      }

      sel.appendChild(o);
    });
  });
}

document.getElementById("loanSelect").addEventListener("change",function(){
  if(!this.value) return;

  fetch("/get_loan_data/"+this.value)
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("infoCard").style.display="block";
    document.getElementById("loanIdInput").value=this.value;
    document.getElementById("balanceText").innerText="₹"+d.balance;
    document.getElementById("loanAmount").innerText="₹"+d.loan.loan_amount;
    document.getElementById("loanPaid").innerText="₹"+d.loan.paid;
    document.getElementById("loanRemaining").innerText="₹"+d.loan.remaining;
  });
});

document.getElementById("loanForm").addEventListener("submit",function(e){
  e.preventDefault();

  fetch("/loan_payment",{
    method:"POST",
    body:new FormData(this)
  })
  .then(res=>res.json())
  .then(()=>{
    document.getElementById("successOverlay").classList.add("show");
  });
});

function closeSuccessPopup(){
  window.location.href="/loan_transactions_report";
}

makeDd("nameRow","nameSearch","nameList",(c,q)=>!q || c.name.toLowerCase().includes(q),c=>c.name);
makeDd("accRow","accSearch","accList",(c,q)=>!q || c.acc.includes(q),c=>c.acc);

</script>

</body>
</html>
